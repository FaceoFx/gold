name: Update Yahoo Gold Chart Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-yahoo-gold:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Yahoo GC=F candles
        run: python scripts/update_yahoo_gold.py

      - name: Commit updated data
        run: |
          if [[ -n "$(git status --porcelain data/yahoo-gold.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/yahoo-gold.json
            git commit -m "Update Yahoo gold chart data"
            git push
          else
            echo "No Yahoo chart changes to commit."
          fi
